services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: anochat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/anochat
      SECRET_KEY: change-me
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
      - ./frontend:/frontend
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres-data:
